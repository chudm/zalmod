name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          cd zal_app
          flutter pub get
      - name: Build APK
        run: |
          cd zal_app
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zal-custom-apk
          path: zal_app/build/app/outputs/flutter-apk/app-release.apk
